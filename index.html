<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practice</title>
    <script src="script.js" defer></script>
    <link href="style.css" rel="stylesheet">
</head>
<body>
    <form action="/index.html" method="post">
        <h1>Payment form</h1>
        <p>Please complete all required (*) fields.</p>
        <section>
            <h2>Contact Information</h2>
            <fieldset>
                <legend>Title</legend>
                    <ul>
                        <li>
                            <input type="radio" id="ace">
                            <label for="ace">Ace</label>
                        </li>
                        <li>
                            <input type="radio" id="king">
                            <label for="king">King</label>
                        </li>
                        <li>
                            <input type="radio" id="queen">
                            <label for="queen">Queen</label>
                        </li>
                    </ul>           
            </fieldset>
            <p>
                <label for="name">Name*:</label>
                <input id="name" type="text" required>
            </p>
            <p>
                <label for="email">Email*:</label>
                <input id="email" type="email" required>
            </p>
            <p>
                <label for="password">Password*:</label>
                <input id="password" type="password" required>
            </p>
        </section>
        <section>
            <h2>Payment Information</h2>
            <p>
                <label for="card">Card Type:</label>
                <select id="card" name="card">
                    <option value="visa">Visa</option>
                    <option value="mastercard">MasterCard</option>
                    <option value="amex">American Express</option>
                </select>
            </p>
            <p>
                <label for="card-number">Card Number*:</label>
                <input id="card-number" name="card-number" type="tel" required>
            </p>
            <p>
                <label for="expiration-date">Expiration Date*:</label>
                <input id="expiration-date" name="expiration-date" type="text" placeholder="MM/YY" pattern="^(0[1-9]|1[0-2])\/([0-9]{2})$" required>
            </p>
        </section>
        <section>
            <button type="submit">Validate the payment</button>
        </section>
    </form>
</body>
</html>
